<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한호빈T Signature 관리 어플리케이션</title>

    <!-- ====== PWA 설정을 위한 태그 ====== -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="https://hanhobin1011-cmyk.github.io/Signature/icon-512x512.png">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed: ', err));
            });
        }
    </script>
    <!-- ======================================== -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Playfair+Display:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #E0E0E0;
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
            word-break: keep-all;
        }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden-screen { display: none !important; }
        .bg-glass { background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .checked-v { background-color: #3b82f6; border-color: #3b82f6; color: white; }
        .checked-r { background-color: #ef4444; border-color: #ef4444; color: white; }
        .font-signature { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col selection:bg-yellow-500 selection:text-white">

    <!-- ==========================================
         [화면 0] 앱 시작 시 스플래시(DB 연결) 화면
    =========================================== -->
    <div id="screen-splash" class="flex-1 flex flex-col items-center justify-center p-6 fixed inset-0 bg-[#121212] z-50">
        <img src="https://hanhobin1011-cmyk.github.io/Signature/icon-512x512.png" alt="Signature Icon" class="w-20 h-20 rounded-[22%] mb-8 animate-pulse shadow-lg shadow-yellow-500/20 border border-gray-800 object-cover">
        <svg class="animate-spin h-8 w-8 text-yellow-500 mb-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <p class="text-gray-400 font-bold text-sm">학원 데이터베이스 연동 중...</p>
    </div>

    <!-- ==========================================
         [화면 1] 로그인 화면
    =========================================== -->
    <div id="screen-login" class="hidden-screen flex-1 flex flex-col items-center justify-center p-6 fade-in">
        <div class="text-center mb-10">
            <img src="https://hanhobin1011-cmyk.github.io/Signature/icon-512x512.png" alt="Signature Icon" class="w-24 h-24 rounded-[22%] shadow-lg shadow-yellow-500/20 mx-auto mb-6 object-cover border border-gray-800">
            <h1 class="text-5xl font-signature italic font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-yellow-100 to-yellow-600 tracking-wider mb-2 drop-shadow-md">Signature</h1>
            <p class="text-gray-400 text-sm mt-3">한호빈T Signature 관리 어플리케이션</p>
        </div>

        <div class="w-full max-w-sm bg-[#1E1E1E] rounded-3xl p-6 border border-gray-800 shadow-2xl">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">아이디</label>
                    <input type="text" id="loginId" placeholder="부여받은 아이디 입력" class="w-full bg-[#121212] border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-yellow-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 ml-1">비밀번호</label>
                    <input type="password" id="loginPw" placeholder="비밀번호 입력" class="w-full bg-[#121212] border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-yellow-500 transition-colors" onkeypress="if(event.key==='Enter') tryLogin()">
                </div>
                <button onclick="tryLogin()" class="w-full bg-[#FEE500] hover:bg-yellow-400 text-[#191919] font-black py-4 rounded-xl mt-4 transition-colors shadow-lg shadow-yellow-500/20">
                    로그인
                </button>
            </div>
        </div>
    </div>


    <!-- 앱 공통 상단 헤더 -->
    <header id="app-header" class="hidden-screen sticky top-0 z-40 bg-glass border-b border-gray-800 px-5 py-4">
        <div class="flex justify-between items-center max-w-md mx-auto w-full">
            <div class="flex items-center gap-3 cursor-pointer" onclick="navTo('main')">
                <img src="https://hanhobin1011-cmyk.github.io/Signature/icon-512x512.png" alt="Signature Icon" class="w-8 h-8 rounded-[22%] object-cover border border-gray-700 shadow-sm shadow-yellow-500/20">
                <span class="font-signature italic font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 tracking-wider text-xl mt-1">Signature</span>
            </div>
            <button onclick="logout()" class="text-xs font-bold text-gray-400 bg-gray-800 px-3 py-1.5 rounded-full hover:text-white transition-colors">
                로그아웃
            </button>
        </div>
    </header>


    <!-- ==========================================
         [화면 2] 메인 대시보드
    =========================================== -->
    <main id="screen-main" class="hidden-screen flex-1 p-5 max-w-md mx-auto w-full fade-in pb-24">
        <div class="mb-8 mt-2">
            <div id="userBadge" class="inline-block px-2.5 py-1 rounded-md text-xs font-bold mb-2"></div>
            <h2 class="text-2xl font-bold text-white">
                <span id="userName" class="text-yellow-400"></span> 님,<br>오늘도 환영합니다!
            </h2>
            <p id="userClassInfo" class="text-sm text-gray-400 mt-2 font-medium"></p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <!-- 학생 메뉴 -->
            <button id="menu-homework" onclick="navTo('homework')" class="bg-[#1E1E1E] border border-gray-700 p-5 rounded-2xl text-left hover:border-yellow-500 hover:bg-gray-800 transition-all group col-span-2 hidden">
                <div class="flex justify-between items-center mb-3">
                    <div class="w-10 h-10 bg-yellow-500/20 text-yellow-400 rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </div>
                    <span class="text-xs font-bold bg-yellow-500 text-black px-2 py-1 rounded-full animate-pulse">진행중</span>
                </div>
                <h3 class="text-white font-bold text-lg">매일 과제 제출</h3>
                <p class="text-gray-400 text-xs mt-1">오늘의 숙제를 점검하고 카톡으로 인증하세요.</p>
            </button>

            <!-- 공통 메뉴 -->
            <button onclick="navTo('report')" class="bg-[#1E1E1E] border border-gray-700 p-5 rounded-2xl text-left hover:border-blue-500 hover:bg-gray-800 transition-all group">
                <div class="w-10 h-10 bg-blue-500/20 text-blue-400 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <h3 class="text-white font-bold">주간 리포트</h3>
                <p class="text-gray-400 text-xs mt-1">학습/테스트 결과</p>
            </button>

            <button onclick="navTo('schedule')" class="bg-[#1E1E1E] border border-gray-700 p-5 rounded-2xl text-left hover:border-green-500 hover:bg-gray-800 transition-all group">
                <div class="w-10 h-10 bg-green-500/20 text-green-400 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <h3 class="text-white font-bold">수업 스케줄</h3>
                <p class="text-gray-400 text-xs mt-1">진도 및 일정표</p>
            </button>

            <!-- 학생 게시판 -->
            <button id="menu-board" onclick="navTo('board')" class="bg-[#1E1E1E] border border-gray-700 p-5 rounded-2xl text-left hover:border-purple-500 hover:bg-gray-800 transition-all group col-span-2 hidden">
                <div class="w-10 h-10 bg-purple-500/20 text-purple-400 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15M9 11l3 3L22 4"></path></svg>
                </div>
                <h3 class="text-white font-bold text-lg">알림 & 자료실</h3>
                <p class="text-gray-400 text-xs mt-1">강사 공지사항 및 보충 학습 자료</p>
            </button>
        </div>
    </main>

    <!-- [화면 3] 숙제 관리, [화면 4] 리포트, [화면 5] 스케줄, [화면 6] 게시판 -->
    <div id="screen-homework" class="hidden-screen flex-1 p-5 max-w-4xl mx-auto w-full fade-in pb-24">
        <button onclick="navTo('main')" class="flex items-center gap-1 text-gray-400 text-sm mb-6 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> 메인으로
        </button>
        <div class="flex justify-between items-end mb-6">
            <div><span id="hwClassBadge" class="px-2 py-1 rounded text-xs font-bold mb-2 inline-block"></span><h2 class="text-2xl font-bold text-white tracking-tight">매일 숙제 점검표</h2></div>
            <div class="text-right"><p class="text-xs text-gray-500 mb-1">학습 목표</p><p id="hwTargetText" class="text-sm font-bold text-white"></p></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5" id="my-homework-container"></div>
    </div>

    <div id="screen-report" class="hidden-screen flex-1 p-5 max-w-md mx-auto w-full fade-in">
        <button onclick="navTo('main')" class="flex items-center gap-1 text-gray-400 text-sm mb-6 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> 메인으로
        </button>
        <h2 class="text-2xl font-bold text-white mb-6">주간 리포트 조회</h2>
        <div id="reportListContainer" class="space-y-4"></div>
    </div>

    <div id="screen-schedule" class="hidden-screen flex-1 p-5 max-w-md mx-auto w-full fade-in">
        <button onclick="navTo('main')" class="flex items-center gap-1 text-gray-400 text-sm mb-6 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> 메인으로
        </button>
        <h2 class="text-2xl font-bold text-white mb-6">나의 수업 스케줄</h2>
        <div class="relative pl-4 space-y-6" id="scheduleListContainer"></div>
    </div>
    
    <div id="screen-board" class="hidden-screen flex-1 p-5 max-w-md mx-auto w-full fade-in">
        <button onclick="navTo('main')" class="flex items-center gap-1 text-gray-400 text-sm mb-6 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> 메인으로
        </button>
        <h2 class="text-2xl font-bold text-white mb-6">알림 & 자료실</h2>
        <div class="space-y-3" id="boardListContainer"></div>
    </div>

    <!-- 모달 등 팝업 UI -->
    <div id="taskModal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm" onclick="if(event.target === this) closeTaskModal()">
        <div class="bg-[#1E1E1E] border border-gray-700 rounded-2xl max-w-sm w-full p-6 shadow-2xl animate-fade-in-up flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-start mb-4 border-b border-gray-700 pb-4 flex-shrink-0">
                <div><h3 id="modalDateTitle" class="text-xl font-bold text-white"></h3><p id="modalRangeDesc" class="text-sm text-gray-400 mt-1 font-medium"></p></div>
                <button onclick="closeTaskModal()" class="text-gray-400 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <div class="space-y-4 mb-5 overflow-y-auto flex-grow pr-1">
                <div class="flex items-center justify-between bg-[#121212] p-3 rounded-lg border border-gray-800">
                    <span class="text-gray-300 font-bold text-sm">진행 상태</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                      <input type="checkbox" id="modalStatusCheck" class="sr-only peer">
                      <div id="modalToggleBg" class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                      <span id="modalStatusText" class="ml-3 text-sm font-bold text-gray-400">미완료</span>
                    </label>
                </div>
                <div>
                    <label class="block text-gray-300 font-bold text-sm mb-2 flex items-center justify-between">
                        <div class="flex items-center gap-2"><span class="bg-yellow-500/20 text-yellow-500 p-1 rounded">❓</span>질문 문항 체크 <span class="text-xs text-gray-500 font-normal">(터치하여 선택)</span></div>
                    </label>
                    <div id="modalQsContainer" class="flex flex-wrap gap-2 max-h-48 overflow-y-auto p-3 bg-[#121212] border border-gray-700 rounded-lg"></div>
                </div>
                <div>
                    <label class="block text-gray-300 font-bold text-sm mb-2 flex items-center gap-2"><span class="bg-purple-500/20 text-purple-500 p-1 rounded">📸</span>인증 사진 준비</label>
                    <div id="photoUploadBtn" onclick="document.getElementById('modalPhotoInput').click()" class="border-2 border-dashed border-gray-600 rounded-xl p-4 text-center cursor-pointer hover:bg-gray-800 transition-colors">
                        <span class="text-sm font-bold text-gray-300">카메라 촬영 또는 앨범 선택</span>
                    </div>
                    <input type="file" id="modalPhotoInput" accept="image/*" multiple class="hidden" onchange="handlePhotoSelection(event)">
                    <div id="photoPreviewContainer" class="hidden mt-2 p-3 bg-[#121212] border border-gray-700 rounded-lg">
                        <div id="photoGrid" class="flex gap-2 overflow-x-auto pb-2"></div>
                        <div class="flex justify-between items-center mt-2 border-t border-gray-800 pt-2">
                            <div id="photoCountText" class="text-green-400 text-xs font-bold"></div>
                            <button onclick="removePhoto()" class="text-gray-400 hover:text-red-400 text-xs font-bold">🗑️ 다시 선택</button>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-300 font-bold text-sm mb-2 flex items-center gap-2"><span class="bg-green-500/20 text-green-500 p-1 rounded">📝</span>추가 코멘트</label>
                    <textarea id="modalMemoInput" rows="2" class="w-full bg-[#121212] border border-gray-700 text-white text-sm rounded-lg p-3"></textarea>
                </div>
                <div class="pt-2 border-t border-gray-800">
                    <label class="block text-gray-300 font-bold text-sm mb-2">🧑‍🎓 제출자</label>
                    <div class="w-full bg-gray-800/50 border border-gray-700 text-gray-400 text-sm font-bold rounded-lg p-3"><span id="modalStudentNameDisplay"></span> 학생</div>
                </div>
            </div>

            <div class="flex flex-col gap-3 flex-shrink-0 pt-2 relative">
                <!-- 제출 버튼 로딩용 -->
                <div id="loadingOverlay" class="absolute inset-0 bg-[#1E1E1E]/90 backdrop-blur-sm z-10 hidden flex-col items-center justify-center rounded-xl">
                    <svg class="animate-spin h-6 w-6 text-yellow-500 mb-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span class="text-xs font-bold text-yellow-500">구글 시트에 전송 중...</span>
                </div>
                <button onclick="submitDataAndCopy()" class="w-full bg-[#FEE500] hover:bg-[#E5CF00] text-[#191919] font-bold py-3.5 rounded-xl transition-colors shadow-lg">제출 및 카톡 인증하기</button>
                <button onclick="saveAndCloseTaskModal()" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold py-3.5 rounded-xl border border-gray-700">임시 저장하고 닫기</button>
            </div>
        </div>
    </div>

    <!-- 복사 완료 알림창 -->
    <div id="customAlertModal" class="fixed inset-0 bg-black/90 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#1E1E1E] border border-gray-700 rounded-2xl max-w-sm w-full p-6 text-center shadow-2xl flex flex-col">
            <div class="w-16 h-16 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-500/20"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
            <h3 class="text-xl font-bold text-white mb-2">제출 준비 완료!</h3>
            
            <div id="videoLinksWrapper" class="bg-blue-900/20 border border-blue-500/30 rounded-xl p-4 my-4 hidden text-left">
                <p class="text-blue-400 text-sm font-bold mb-3">▶ 내가 질문한 문항 해설영상</p>
                <div id="videoLinksContainer" class="flex flex-col gap-2 max-h-40 overflow-y-auto"></div>
            </div>

            <p class="text-gray-400 text-sm mb-4">카카오톡 채팅방이 열리면 대화창을 길게 눌러 <strong>[붙여넣기]</strong>를 해주세요.</p>
            <button onclick="finalKakaoRedirect()" class="w-full bg-[#FEE500] hover:bg-[#E5CF00] text-[#191919] font-bold py-3.5 rounded-xl transition-colors shadow-lg mb-2">카카오톡 바로 열기</button>
            <button onclick="closeCustomAlert()" class="w-full text-gray-500 hover:text-gray-300 text-sm font-bold py-2 transition-colors">닫기</button>
        </div>
    </div>


    <script>
        // ==========================================
        // ★ 구글 앱스 스크립트 웹앱 주소 (최종 배포 URL 적용 완료)
        // ==========================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz4goHVoKhC0u4Ixwa4a7PccPBfteAOZqnlAipBCjLZbZ1zEeIpTa3peBtcKyL3QW61ZQ/exec"; 

        // 영상 DB (필요 시 문제 번호와 영상 링크 추가)
        const videoDB = { 
            "9": "https://youtu.be/예시링크1", 
            "10": "https://youtu.be/예시링크2" 
        }; 

        // 전역 상태 변수 (구글에서 받아온 데이터 저장소)
        let globalDB = null; 
        let currentUser = null;

        // ==========================================

        function generateQuestionButtons(rangeStr) {
            const container = document.getElementById('modalQsContainer');
            container.innerHTML = '';
            const regex = /(B|C)\s*(\d+)~(\d+)/g;
            let match;
            while ((match = regex.exec(rangeStr)) !== null) {
                const level = match[1], start = parseInt(match[2]), end = parseInt(match[3]);
                for (let i = start; i <= end; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i; btn.dataset.level = level;
                    if (currentSelectedQs.has(i.toString())) {
                        btn.className = `w-[42px] h-[42px] rounded-lg text-sm font-bold border-2 ${level==='B'?'border-blue-500 bg-blue-500':'border-red-500 bg-red-500'} text-white shadow-lg scale-105`;

                        btn.className = `w-[42px] h-[42px] rounded-lg text-sm font-bold border ${level==='B'?'border-blue-900/50 text-blue-400 bg-blue-900/10':'border-red-900/50 text-red-400 bg-red-900/10'}`;
                    }
                    btn.onclick = () => {
                        currentSelectedQs.has(i.toString()) ? currentSelectedQs.delete(i.toString()) : currentSelectedQs.add(i.toString());
                        generateQuestionButtons(rangeStr);
                    };
                    container.appendChild(btn);
                }
            }
        }

        // 이미지 압축
        function resizeAndEncodeImage(file, maxWidth = 1024) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve({ data: canvas.toDataURL('image/jpeg', 0.7), mimeType: 'image/jpeg' });
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 제출 및 구글 통신
        async function submitDataAndCopy() {
            const qsArr = Array.from(currentSelectedQs).sort((a,b)=>a-b);
            const qsText = qsArr.length > 0 ? qsArr.join(', ') : '없음';
            const memo = document.getElementById('modalMemoInput').value.trim();
            const isDone = document.getElementById('modalStatusCheck').checked;
            const stateIcon = isDone ? "⭕ 완료" : "❌ 미완료";

            // 1. 카톡 클립보드 복사
            let copyText = `[Signature ${currentTask.className} 숙제 인증]\n` +
                           `🧑‍🎓 이름: ${currentUser.name}\n` +
                           `📅 일자: ${currentTask.date}\n` +
                           `📚 범위: ${currentTask.range}\n` +
                           `✅ 상태: ${stateIcon}\n` +
                           `❓ 질문: ${qsText}\n`;
            if (memo) copyText += `📝 코멘트: ${memo}\n`;

            try {
                const ta = document.createElement("textarea");
                ta.value = copyText; ta.style.position="fixed"; ta.style.left="-9999px";
                document.body.appendChild(ta); ta.focus(); ta.select();
                document.execCommand('copy'); ta.remove();
            } catch(e) {}

            // 2. 로딩 띄우기
            document.getElementById('loadingOverlay').classList.remove('hidden');

            try {
                // 이미지 압축
                const base64Images = [];
                if (selectedPhotos.length > 0) {
                    for (let file of selectedPhotos) {
                        base64Images.push(await resizeAndEncodeImage(file));
                    }
                }

                // 구글 시트로 POST 전송
                const payload = {
                    name: currentUser.name,
                    className: currentTask.className,
                    date: currentTask.date,
                    range: currentTask.range,
                    status: isDone ? "완료" : "미완료",
                    questions: qsText,
                    memo: memo,
                    images: base64Images
                };

                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // CORS 차단 방지용
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                console.error("전송 오류:", error);
            } finally {
                document.getElementById('loadingOverlay').classList.add('hidden');
                
                // 해설 영상 세팅 및 알림창 오픈
                const vContainer = document.getElementById('videoLinksContainer');
                vContainer.innerHTML = '';
                let hasVideo = false;
                qsArr.forEach(q => {
                    if(videoDB[q]) {
                        hasVideo = true;
                        vContainer.innerHTML += `<a href="${videoDB[q]}" target="_blank" class="bg-blue-600/20 hover:bg-blue-500/40 text-blue-300 text-sm py-2.5 px-4 rounded-lg flex justify-between border border-blue-500/30 mb-2"><span class="font-bold">▶ 문항 ${q}번 해설</span><span class="text-xs bg-blue-500/20 px-2 py-1 rounded">시청하기</span></a>`;
                    }
                });
                document.getElementById('videoLinksWrapper').style.display = hasVideo ? 'block' : 'none';
                document.getElementById('customAlertModal').classList.remove('hidden');
            }
        }

        function handlePhotoSelection(event) {

            if (files.length > 0) {

                selectedPhotos.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'w-20 h-20 object-cover rounded-lg border border-gray-600 flex-shrink-0';
                        grid.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
                document.getElementById('photoCountText').innerHTML = `${selectedPhotos.length}장의 사진 준비 완료!`;
                document.getElementById('photoUploadBtn').classList.add('hidden');
                document.getElementById('photoPreviewContainer').classList.remove('hidden');
            }
        }

        function removePhoto() {
            document.getElementById('modalPhotoInput').value = '';
            selectedPhotos = [];
            document.getElementById('photoGrid').innerHTML = '';
            document.getElementById('photoPreviewContainer').classList.add('hidden');
            document.getElementById('photoUploadBtn').classList.remove('hidden');
        }
    </script>
<script>
  // 1. 마우스 우클릭 방지
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault(); // 우클릭 메뉴가 뜨지 않게 합니다.
    // alert('보안을 위해 우클릭을 사용할 수 없습니다.'); // 경고창이 필요하면 주석(//)을 지우세요.
  });

  // 2. 개발자 도구 및 소스 보기 단축키 방지
  document.addEventListener('keydown', function(e) {
    // F12 키 방지 (가장 많이 쓰는 개발자 도구 키)
    if (e.keyCode === 123) {
      e.preventDefault();
      e.returnValue = false;
    }

    // Ctrl+Shift+I (개발자 도구) / Ctrl+Shift+J (콘솔) / Ctrl+Shift+C (요소 검사)
    if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
      e.preventDefault();
      e.returnValue = false;
    }

    // Ctrl+U (소스 보기)
    if (e.ctrlKey && e.keyCode === 85) {
      e.preventDefault();
      e.returnValue = false;
    }
  });
</script>
