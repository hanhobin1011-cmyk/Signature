<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signature 앱 설치하기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #E0E0E0; font-family: 'Noto Sans KR', sans-serif; }
        .bg-gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }
        .app-icon { box-shadow: 0 15px 35px rgba(251, 191, 36, 0.2); }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="fade-in max-w-sm w-full">
        <!-- 앱 아이콘 -->
        <div class="mb-8 flex justify-center">
            <div class="w-28 h-28 bg-gold-gradient rounded-[22%] flex items-center justify-center text-white text-5xl font-black app-icon border border-yellow-400/30">
                S
            </div>
        </div>

        <!-- 안내 문구 -->
        <h1 class="text-3xl font-black text-white mb-3 tracking-tight">Signature</h1>
        <p class="text-gray-400 mb-10 leading-relaxed font-medium">
            한호빈T 수학과 전용 매니저<br>
            바탕화면에 설치하고 1초 만에 확인하세요.
        </p>

        <!-- 핵심 버튼 -->
        <div id="installArea" class="space-y-4">
            <button id="btnMainAction" class="w-full bg-gold-gradient text-white font-black py-4 rounded-2xl shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all text-lg">
                앱 즉시 설치하기
            </button>
            <p id="subText" class="text-xs text-gray-500">이미 설치했다면 브라우저를 닫으셔도 됩니다.</p>
        </div>
    </div>

    <!-- 푸터 -->
    <div class="fixed bottom-10 text-gray-600 text-xs">
        &copy; 2026 Signature Manager. All rights reserved.
    </div>

    <script>
        let deferredPrompt;
        const btn = document.getElementById('btnMainAction');
        const subText = document.getElementById('subText');

        // 안드로이드 설치 이벤트 캡처
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        const isIos = () => /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        // 아이폰인 경우 버튼 문구 변경
        if (isIos()) {
            btn.textContent = "설치 방법 확인하기 (iOS)";
        }

        btn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // 안드로이드/크롬 설치 실행
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    btn.textContent = "설치 중...";
                    btn.disabled = true;
                }
                deferredPrompt = null;
            } else {
                // 아이폰이거나 설치 팝업이 안 뜨는 경우 가이드 페이지로 이동
                window.location.href = './Install.html';
            }
        });

        // 이미 설치된 상태라면 메인으로 이동 버튼으로 변경
        if (isStandalone) {
            btn.textContent = "앱 실행하기";
            btn.addEventListener('click', () => {
                window.location.href = './Signature App.html';
            });
        }
    </script>
</body>
</html>
